name: JW Branded RustDesk (sciter x64)

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  build-sciter-x64:
    runs-on: windows-2022
    steps:
      - name: Export GH Actions cache env
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Checkout (submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Inject server config + app name (branding)
        shell: bash
        run: |
          cfg=libs/hbb_common/src/config.rs
          sed -i 's#pub const RENDEZVOUS_SERVERS: &\[&str\] = &\["[^"]*"\];#pub const RENDEZVOUS_SERVERS: \&[\&str] = \&["108.61.126.191"];#' "$cfg"
          sed -i 's#pub const RS_PUB_KEY: &str = "[^"]*";#pub const RS_PUB_KEY: \&str = "U1zWuXjEvB611RacTE1X+v9ovultm3ttIgUgLeIMtLM=";#' "$cfg"
          sed -i 's#RwLock::new("RustDesk".to_owned())#RwLock::new("중원컨설팅 원격지원".to_owned())#' "$cfg"
          echo "----- verify -----"
          grep -nE 'RENDEZVOUS_SERVERS: &|RS_PUB_KEY: &str|APP_NAME: RwLock' "$cfg"

      - name: Install LLVM/Clang (x64) + set LIBCLANG_PATH
        shell: pwsh
        run: |
          choco install -y llvm --version=15.0.2 --allow-downgrade --no-progress
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install Rust toolchain (1.75 for sciter)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.75"
          targets: x86_64-pc-windows-msvc
          components: "rustfmt"

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: windows-2022-sciter-x64

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: C:\vcpkg
          vcpkgGitCommitId: "120deac3062162151622ca4860575a33844ba10b"
          doNotCache: false

      - name: Install vcpkg dependencies (x64-windows-static)
        env:
          VCPKG_DEFAULT_HOST_TRIPLET: x64-windows-static
        shell: bash
        run: |
          "$VCPKG_ROOT/vcpkg" install --triplet x64-windows-static --x-install-root="$VCPKG_ROOT/installed"

      - name: Build rustdesk (sciter x64, inline only)
        shell: bash
        run: |
          python3 res/inline-sciter.py
          cargo build --features inline --release --bins
          mkdir -p ./Release
          mv ./target/release/rustdesk.exe ./Release/rustdesk.exe
          curl -LJ -o ./Release/sciter.dll https://github.com/c-smile/sciter-sdk/raw/master/bin.win/x64/sciter.dll

      - name: Build self-extracted single exe
        shell: bash
        run: |
          sed -i '/dpiAware/d' res/manifest.xml || true
          pushd ./libs/portable
          pip3 install -r requirements.txt
          python3 ./generate.py -f ../../Release/ -o . -e ../../Release/rustdesk.exe
          popd
          mkdir -p ./SignOutput
          mv ./target/release/rustdesk-portable-packer.exe "./SignOutput/JungwonRemoteSupport-x64.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jw-remote-support-win-x64
          path: |
            ./SignOutput/*.exe
            ./Release/rustdesk.exe
            ./Release/sciter.dll
